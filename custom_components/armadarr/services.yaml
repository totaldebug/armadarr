system_task:
  name: System Task
  description: Execute a system task on the Arr application.
  fields:
    entry_id:
      name: Integration ID
      description: The ID of the Armadarr integration.
      required: true
      selector:
        config_entry:
          integration: armadarr
    task:
      name: Task Name
      description: The name of the task to execute (e.g., RssSync, Backup).
      required: true
      selector:
        text:

search_missing:
  name: Search Missing
  description: Trigger a search for missing items.
  fields:
    entry_id:
      name: Integration ID
      description: The ID of the Armadarr integration.
      required: true
      selector:
        config_entry:
          integration: armadarr

add_series:
  name: Add Series
  description: Add a new series to Sonarr.
  fields:
    entry_id:
      name: Integration ID
      description: The ID of the Armadarr integration.
      required: true
      selector:
        config_entry:
          integration: armadarr
    title:
      name: Title
      description: The title of the series to search for if TVDB ID is not provided.
      required: false
      selector:
        text:
    tvdb_id:
      name: TVDB ID
      description: The TVDB ID of the series.
      required: false
      selector:
        number:
          mode: box
    quality_profile_id:
      name: Quality Profile ID
      description: The ID of the quality profile to use.
      required: true
      selector:
        number:
          mode: box
    root_folder_path:
      name: Root Folder Path
      description: The path to the root folder where the series will be saved.
      required: true
      selector:
        text:

add_movie:
  name: Add Movie
  description: Add a new movie to Radarr.
  fields:
    entry_id:
      name: Integration ID
      description: The ID of the Armadarr integration.
      required: true
      selector:
        config_entry:
          integration: armadarr
    title:
      name: Title
      description: The title of the movie to search for if TMDB ID is not provided.
      required: false
      selector:
        text:
    tmdb_id:
      name: TMDB ID
      description: The TMDB ID of the movie.
      required: false
      selector:
        number:
          mode: box
    quality_profile_id:
      name: Quality Profile ID
      description: The ID of the quality profile to use.
      required: true
      selector:
        number:
          mode: box
    root_folder_path:
      name: Root Folder Path
      description: The path to the root folder where the movie will be saved.
      required: true
      selector:
        text:

lookup_series:
  name: Lookup Series
  description: Search for a series on TheTVDB.
  fields:
    entry_id:
      name: Integration ID
      description: The ID of the Armadarr integration.
      required: true
      selector:
        config_entry:
          integration: armadarr
    term:
      name: Search Term
      description: The title or TVDB ID (tvdb:123) to search for.
      required: true
      selector:
        text:

lookup_movie:
