blueprint:
  name: "Armadarr: Add author (Readarr)"
  description: >
    Add the author currently selected in the result dropdown to Readarr via
    `armadarr.add_author`, using the quality profile, metadata profile and root
    folder selected in their dropdowns. Run "Lookup author" first to populate
    the result dropdown, and "Refresh profiles & root folders" (with a metadata
    dropdown) to populate the others.
  domain: script
  homeassistant:
    min_version: "2024.1.0"
  source_url: https://github.com/totaldebug/armadarr/blob/main/blueprints/script/armadarr/add_author.yaml
  input:
    armadarr_entry:
      name: Armadarr instance (Readarr)
      description: The Armadarr Readarr integration entry.
      selector:
        config_entry:
          integration: armadarr
    result_helper:
      name: Result dropdown
      description: The input_select populated by "Lookup author".
      selector:
        entity:
          filter:
            domain: input_select
    quality_helper:
      name: Quality profile dropdown
      description: The input_select populated by "Refresh profiles & root folders".
      selector:
        entity:
          filter:
            domain: input_select
    metadata_helper:
      name: Metadata profile dropdown
      description: The input_select populated by "Refresh profiles & root folders".
      selector:
        entity:
          filter:
            domain: input_select
    root_helper:
      name: Root folder dropdown
      description: The input_select populated by "Refresh profiles & root folders".
      selector:
        entity:
          filter:
            domain: input_select

mode: single
icon: mdi:book-plus

sequence:
  - variables:
      result_entity: !input result_helper
      quality_entity: !input quality_helper
      metadata_entity: !input metadata_helper
      root_entity: !input root_helper
      selected: "{{ states(result_entity) }}"
      author_id: "{{ selected | regex_findall('\\(([^)]+)\\)$') | first | default('', true) }}"
      quality_id: "{{ states(quality_entity) | regex_findall('\\((\\d+)\\)$') | first | default('', true) }}"
      metadata_id: "{{ states(metadata_entity) | regex_findall('\\((\\d+)\\)$') | first | default('', true) }}"
      root_path: "{{ states(root_entity) }}"
  - if:
      - condition: template
        value_template: >
          {{ selected in ['No results', 'unknown', 'unavailable', '']
             or author_id == ''
             or not quality_id | int(0)
             or not metadata_id | int(0)
             or root_path in ['unknown', 'unavailable', '', 'No root folders found'] }}
    then:
      - action: persistent_notification.create
        data:
          title: Armadarr add author
          message: >
            Pick a valid author, quality profile, metadata profile and root
            folder first (run Lookup author and Refresh profiles).
    else:
      - action: armadarr.add_author
        data:
          entry_id: !input armadarr_entry
          author_id: "{{ author_id }}"
          quality_profile_id: "{{ quality_id | int }}"
          metadata_profile_id: "{{ metadata_id | int }}"
          root_folder_path: "{{ root_path }}"
      - action: persistent_notification.create
        data:
          title: Armadarr add author
          message: "Added {{ selected }} to Readarr."
